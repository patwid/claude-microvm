name: Update flake.lock

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/update-flake-lock@v28
        with:
          pr-title: "chore: nix flake update"
          pr-body: |
            Automated weekly `nix flake update`.

            Bumps `nixpkgs` (nixos-unstable) and `microvm` to their latest
            available revisions. CI will build all four flavors against the
            updated lock file.
          pr-labels: |
            dependencies
            automated
